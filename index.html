<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Future and Connection</title>
    <meta
      name="description"
      content="A landing page for Future and Connection with a photo, title, subtitle, and hidden navigation."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="landing-body">
    <div class="site-frame">
      <main class="landing-page" id="top">
        <button
          class="menu-toggle is-hidden"
          id="menuToggle"
          type="button"
          aria-expanded="false"
          aria-controls="sideMenu"
          aria-label="Open menu"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>

        <div class="hero-image-wrap">
          <img class="hero-image" src="./assets/images/home-hero.jpg" alt="Summer SDI photo" />
          <div class="hero-shade"></div>
        </div>

        <button class="title-overlay" id="titleOverlay" type="button" aria-label="Dismiss title">
          <div class="title-stack">
            <h1>Future and Connection</h1>
            <p class="title-subline">we wish us all the best</p>
          </div>
        </button>
      </main>

      <aside class="side-menu" id="sideMenu" aria-hidden="true">
        <div class="menu-panel">
          <div class="menu-head">
            <p class="menu-label">Menu</p>
            <button class="menu-close" id="menuClose" type="button" aria-label="Close menu">
              <span></span>
              <span></span>
            </button>
          </div>

          <nav class="menu-nav" aria-label="Site navigation">
            <a href="./index.html">Home</a>
            <a href="./reports.html">Reports</a>
            <a href="./grants.html">Grant Applications</a>
            <a href="./planning.html">Planning</a>
            <a href="./projects.html">Projects</a>
            <a href="./visuals.html">Visuals</a>
          </nav>
        </div>
      </aside>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
